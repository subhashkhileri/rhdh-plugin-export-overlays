 installation: |
     ## Installation

     ### Installing the MCP Actions Backend Plugin

     First, install the `MCP Actions Backend` plugin available in the marketplace

     ### Dynamic Plugin Installation for Red Hat Developer Hub

     Add the following configuration to your dynamic plugin yaml:

     ```yaml
     includes:
       - dynamic-plugins.default.yaml
     plugins:
       # MCP extras backend plugin
       - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-techdocs-mcp-extras:bs_1.48.3__0.2.1!red-hat-developer-hub-backstage-plugin-techdocs-mcp-extras
         disabled: false
     ```

     ## RHDH Configuration

     ### Complete Configuration Reference

    
     Register the MCP Extras as a plugin source in your App Config:

     ```yaml
     backend:
       actions:
         pluginSources:
           - techdocs-mcp-extras
     ```
