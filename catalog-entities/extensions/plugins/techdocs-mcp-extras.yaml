 description: |
     # Techdocs MCP Extras Plugin


     A backend plugin that provides Red Hat–specific MCP tools for Techdocs, layering on top of the upstream MCP server.


     Model Context Protocol (MCP) provides a standard for connecting AI models and applications (MCP clients) to external systems. RHDH uses the upstream mcp-actions-backend plugin; this Extras plugin adds Techdocs-specific tools.

     ### Key Features


     - **Querying Techdocs**: Supports metadata retrieval about techdocs, with flexible options for filtering
     - **Documentation Retrieval**: Allows techdoc content to be retrieved by AI clients
     - **Documentation Coverage**: Allows AI clients to retrieve information about documentation coverage in the catalog

     ## Support


     - **MCP Server Plugin**: [MCP Server README](https://github.com/backstage/backstage/blob/master/plugins/mcp-actions-backend/README.md)
     - **Backend Plugin**: [Backend README](https://github.com/redhat-developer/rhdh-plugins/blob/main/workspaces/mcp-integrations/README.md)
     - **Issues**: [Jira Issues](https://issues.redhat.com/browse/RHDHBUGS)


