# Enable Scorecard plugin for e2e tests.
# Dynamic Home Page is provided by the RHDH chart default; do not redefine it here to avoid config merge conflicts.
plugins:
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard:bs_1.49.4__2.5.1!red-hat-developer-hub-backstage-plugin-scorecard
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-scorecard:
            translationResources:
              - importName: scorecardTranslations
                ref: scorecardTranslationRef
            entityTabs:
              - path: "/scorecard"
                title: Scorecard
                mountPoint: entity.page.scorecard
            dynamicRoutes:
              - path: /scorecard/aggregations/:aggregationId/metrics/:metricId
                importName: ScorecardPage
            mountPoints:
              - mountPoint: entity.page.scorecard/cards
                importName: EntityScorecardContent
                config:
                  layout:
                    gridColumn: 1 / -1
              - mountPoint: home.page/cards
                importName: ScorecardHomepageCard
                config:
                  id: "scorecard-jira.open_issues"
                  title: "Jira open blocking tickets"
                  props:
                    metricId: "jira.open_issues"
              - mountPoint: home.page/cards
                importName: ScorecardHomepageCard
                config:
                  id: "scorecard-github.open_prs"
                  title: "GitHub open PRs"
                  props:
                    metricId: "github.open_prs"
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard-backend:bs_1.49.4__2.5.1!red-hat-developer-hub-backstage-plugin-scorecard-backend
    disabled: false
    pluginConfig:
      scorecard:
        plugins:
          jira:
            open_issues:
              schedule:
                frequency: { minutes: 1 }
                timeout: { minutes: 5 }
                initialDelay: { seconds: 5 }
          github:
            open_prs:
              schedule:
                frequency: { minutes: 1 }
                timeout: { minutes: 15 }
                initialDelay: { seconds: 5 }
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard-backend-module-github:bs_1.49.4__2.5.1!red-hat-developer-hub-backstage-plugin-scorecard-backend-module-github
    disabled: false
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard-backend-module-jira:bs_1.49.4__2.5.1!red-hat-developer-hub-backstage-plugin-scorecard-backend-module-jira
    disabled: false
    pluginConfig:
      jira:
        baseUrl: https://redhat.atlassian.net
        token: ${JIRA_TOKEN}
        product: cloud
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-dynamic-home-page:bs_1.45.3__1.10.3!red-hat-developer-hub-backstage-plugin-dynamic-home-page
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-dynamic-home-page:
            dynamicRoutes:
              - path: /
                importName: DynamicCustomizableHomePage
            mountPoints:
              - mountPoint: home.page/cards
                importName: OnboardingSection
                config:
                  id: "onboarding-section"
                  title: "Onboarding section"
              - mountPoint: home.page/cards
                importName: EntitySection
                config:
                  id: "entity-section"
                  title: "Entity section"
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page
    disabled: true
